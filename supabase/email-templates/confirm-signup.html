<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmá tu cuenta</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;padding:24px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <img src="https://forfvifldysmnrpgreym.supabase.co/storage/v1/object/public/avatars/public/logo_upiti.svg" alt="Upiti" width="140" style="display:block;border:0;outline:none;" />
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border-radius:16px;padding:40px 32px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:800;color:#111827;">¡Casi listo!</h1>
              <p style="margin:0 0 24px;font-size:15px;color:#6b7280;line-height:1.6;">
                Hacé clic en el botón de abajo para confirmar tu correo y empezar a vender en Upiti.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                <tr>
                  <td align="center" style="background-color:#ed355d;border-radius:12px;padding:14px 40px;">
                    <a href="{{ .ConfirmationURL }}" style="color:#ffffff;font-size:16px;font-weight:700;text-decoration:none;display:inline-block;line-height:1.2;">Confirmar cuenta</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 4px;font-size:13px;color:#9ca3af;line-height:1.5;">
                Si no creaste esta cuenta, ignorá este mensaje.
              </p>
              <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.5;">
                O copiá este enlace en tu navegador:<br />
                <a href="{{ .ConfirmationURL }}" style="color:#ed355d;word-break:break-all;font-size:12px;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                &copy; 2026 Upiti &mdash; Todos los derechos reservados
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
